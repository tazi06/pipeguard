# Bad GitHub Actions workflow — triggers many PipeGuard rules
# DO NOT use this in production

name: CI

on:
  push:
    branches: ['*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - name: Build
        env:
          DB_PASSWORD: "supersecret123"
          AWS_SECRET_KEY: ${{ secrets.AWS_KEY }}
        run: |
          echo $DB_PASSWORD
          curl -sSL https://install.example.com | bash
          npm install
          npm run build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@master
      - name: Test
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@master
      - name: Deploy
        run: |
          scp -o StrictHostKeyChecking=no build/* user@prod:/var/www/
          ssh prod "sudo systemctl restart app"
